name: Accessibility Check (pa11y-ci)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  a11y-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install serve and pa11y-ci
        run: |
          npm install -g serve
          npm install -g pa11y-ci

      - name: Start server in background
        run: |
          serve -s dist -p 5174 &
          echo "Waiting for server..."
          sleep 5

      - name: Run pa11y-ci
        run: pa11y-ci http://localhost:5174/
        env:
          CI: true
